version: "3.9"

services:
  app:
    image: ${FULL_IMAGE}
    container_name: restaurant-ops
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - db

    networks:
      - app-db

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: mongo:5.0
    restart: unless-stopped

    volumes:
      - db_data:/data/db

    networks:
      - app-db

    ports:
      - "27017:27017"

networks:
  app-db:

volumes:
  db_data: